name: "Timeweb VPS Management"

# Полное управление VPS через Timeweb API — без захода в панель
# Запуск: gh workflow run timeweb-manage.yml --ref main -f action=server-status

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          # --- Серверы ---
          - server-status          # Статус сервера (IP, CPU, RAM, диск)
          - server-list            # Список всех серверов
          - server-reboot          # Перезагрузить сервер
          - server-shutdown        # Выключить сервер
          - server-start           # Включить сервер
          - server-logs            # Логи контейнеров (через SSH)
          - db-migrate             # Применить pending migration (birthday/gender)
          # --- Бэкапы ---
          - backup-create          # Создать снапшот сервера
          - backup-list            # Список снапшотов
          # --- DNS ---
          - dns-list               # Все DNS-записи
          - dns-add-a              # Добавить A-запись
          - dns-add-cname          # Добавить CNAME-запись
          - dns-delete             # Удалить DNS-запись
          # --- Firewall ---
          - firewall-list          # Правила firewall
          - firewall-add-rule      # Добавить правило
          # --- SSH ключи ---
          - ssh-keys-list          # Список SSH-ключей
          # --- Аккаунт ---
          - account-balance        # Баланс аккаунта
          - account-full-status    # Полный отчёт (сервер + DNS + firewall + баланс)
          # --- Произвольный API ---
          - custom-api             # Любой API-вызов
      server_id:
        description: "Server ID (auto-detect if empty)"
        required: false
      domain:
        description: "Domain (for DNS actions)"
        required: false
        default: "delovoy-park.ru"
      dns_type:
        description: "DNS record type (A, CNAME, TXT, MX)"
        required: false
        default: "A"
      dns_subdomain:
        description: "Subdomain for DNS (@ for root, www, api, etc.)"
        required: false
        default: "@"
      dns_value:
        description: "DNS record value (IP for A, domain for CNAME)"
        required: false
      dns_record_id:
        description: "DNS record ID (for delete)"
        required: false
      firewall_port:
        description: "Port number (for firewall-add-rule)"
        required: false
      firewall_protocol:
        description: "Protocol (tcp/udp)"
        required: false
        default: "tcp"
      custom_endpoint:
        description: "API endpoint (for custom-api, e.g. /api/v1/servers)"
        required: false
      custom_method:
        description: "HTTP method (GET/POST/PUT/DELETE)"
        required: false
        default: "GET"
      custom_body:
        description: "JSON body (for POST/PUT custom-api)"
        required: false

env:
  TIMEWEB_API: "https://api.timeweb.cloud"

jobs:
  manage:
    runs-on: ubuntu-latest
    env:
      TW_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
    steps:
      # --- Helper: Auto-detect server ID ---
      - name: Detect Server ID
        id: detect
        run: |
          SID="${{ inputs.server_id }}"
          if [ -z "$SID" ]; then
            SID=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
              "${{ env.TIMEWEB_API }}/api/v1/servers" | jq '.servers[0].id // empty')
          fi
          echo "server_id=$SID" >> $GITHUB_OUTPUT
          echo "Using server ID: $SID"

      # ==================== SERVERS ====================

      - name: Server Status
        if: inputs.action == 'server-status'
        run: |
          SID="${{ steps.detect.outputs.server_id }}"
          if [ -z "$SID" ]; then echo "No servers found"; exit 0; fi

          echo "=== Server Details ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID" | \
            jq '.server | {id, name, status, ip: (.networks[0].ips[0].ip // "none"), os: .os.name, cpu, ram, disk, location, preset_id}'

          echo ""
          echo "=== Statistics ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/statistics?date_from=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-1H +%Y-%m-%dT%H:%M:%S)&date_to=$(date -u +%Y-%m-%dT%H:%M:%S)" | jq '.' 2>/dev/null || echo "No stats available"

      - name: Server List
        if: inputs.action == 'server-list'
        run: |
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers" | \
            jq '.servers[] | {id, name, status, ip: (.networks[0].ips[0].ip // "none"), cpu, ram, disk}'
          echo ""
          echo "Total:"
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers" | jq '.meta.total'

      - name: Server Reboot
        if: inputs.action == 'server-reboot'
        run: |
          SID="${{ steps.detect.outputs.server_id }}"
          echo "Rebooting server $SID..."
          curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"action": "reboot"}' \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/action" | jq '.'

      - name: Server Shutdown
        if: inputs.action == 'server-shutdown'
        run: |
          SID="${{ steps.detect.outputs.server_id }}"
          echo "Shutting down server $SID..."
          curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"action": "shutdown"}' \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/action" | jq '.'

      - name: Server Start
        if: inputs.action == 'server-start'
        run: |
          SID="${{ steps.detect.outputs.server_id }}"
          echo "Starting server $SID..."
          curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"action": "start"}' \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/action" | jq '.'

      - name: Server Logs (via SSH)
        if: inputs.action == 'server-logs'
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== App Logs (last 50 lines) ==="
            cd /opt/delovoy-park && docker compose logs --tail=50 app 2>/dev/null || echo "No app container"
            echo ""
            echo "=== Disk Usage ==="
            df -h / | tail -1
            echo ""
            echo "=== Memory ==="
            free -h | head -2
            echo ""
            echo "=== Docker Disk ==="
            docker system df

      - name: DB Migrate (via SSH)
        if: inputs.action == 'db-migrate'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Applying migration: add_user_birthday_gender ==="
            docker compose -f /opt/delovoy-park/docker-compose.yml exec -T postgres \
              psql -U delovoy delovoy_park -c \
              "ALTER TABLE \"User\" ADD COLUMN IF NOT EXISTS \"birthday\" TIMESTAMP(3); ALTER TABLE \"User\" ADD COLUMN IF NOT EXISTS \"gender\" TEXT;"
            echo "=== Verifying columns ==="
            docker compose -f /opt/delovoy-park/docker-compose.yml exec -T postgres \
              psql -U delovoy delovoy_park -c "\d \"User\"" | grep -E "birthday|gender"
            echo "=== Migration complete ==="

      # ==================== BACKUPS ====================

      - name: Create Backup
        if: inputs.action == 'backup-create'
        run: |
          SID="${{ steps.detect.outputs.server_id }}"
          echo "Creating snapshot for server $SID..."

          # Get disk ID first
          DISK_ID=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/disks" | jq '.disks[0].id // empty')

          if [ -n "$DISK_ID" ]; then
            curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"comment\": \"Manual backup $(date +%Y-%m-%d_%H:%M)\"}" \
              "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/disks/$DISK_ID/backups" | jq '.'
          else
            echo "No disks found for server $SID"
          fi

      - name: List Backups
        if: inputs.action == 'backup-list'
        run: |
          SID="${{ steps.detect.outputs.server_id }}"
          DISK_ID=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/disks" | jq '.disks[0].id // empty')

          if [ -n "$DISK_ID" ]; then
            curl -s -H "Authorization: Bearer $TW_TOKEN" \
              "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/disks/$DISK_ID/backups" | \
              jq '.backups[] | {id, status, comment, created_at, size}'
          else
            echo "No disks found"
          fi

      # ==================== DNS ====================

      - name: DNS List
        if: inputs.action == 'dns-list'
        run: |
          DOMAIN="${{ inputs.domain }}"
          echo "=== DNS Records for $DOMAIN ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/domains/$DOMAIN/dns-records" | \
            jq '.dns_records[] | {id, type: .type, subdomain: .data.subdomain, value: .data.value, priority: .data.priority}' 2>/dev/null || \
          echo "Domain not found in Timeweb. Add it first via provision workflow."

      - name: DNS Add A Record
        if: inputs.action == 'dns-add-a'
        run: |
          DOMAIN="${{ inputs.domain }}"
          echo "Adding A record: ${{ inputs.dns_subdomain }}.$DOMAIN → ${{ inputs.dns_value }}"
          curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"type\": \"A\", \"subdomain\": \"${{ inputs.dns_subdomain }}\", \"value\": \"${{ inputs.dns_value }}\"}" \
            "${{ env.TIMEWEB_API }}/api/v1/domains/$DOMAIN/dns-records" | jq '.'

      - name: DNS Add CNAME Record
        if: inputs.action == 'dns-add-cname'
        run: |
          DOMAIN="${{ inputs.domain }}"
          echo "Adding CNAME record: ${{ inputs.dns_subdomain }}.$DOMAIN → ${{ inputs.dns_value }}"
          curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"type\": \"CNAME\", \"subdomain\": \"${{ inputs.dns_subdomain }}\", \"value\": \"${{ inputs.dns_value }}\"}" \
            "${{ env.TIMEWEB_API }}/api/v1/domains/$DOMAIN/dns-records" | jq '.'

      - name: DNS Delete Record
        if: inputs.action == 'dns-delete'
        run: |
          DOMAIN="${{ inputs.domain }}"
          echo "Deleting DNS record ${{ inputs.dns_record_id }} from $DOMAIN"
          curl -s -X DELETE -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/domains/$DOMAIN/dns-records/${{ inputs.dns_record_id }}" | jq '.'

      # ==================== FIREWALL ====================

      - name: Firewall List
        if: inputs.action == 'firewall-list'
        run: |
          echo "=== Firewall Groups ==="
          GROUPS=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/firewall/groups")
          echo "$GROUPS" | jq '.groups[] | {id, name, rules_count}'

          for GID in $(echo "$GROUPS" | jq -r '.groups[].id // empty'); do
            echo ""
            echo "=== Rules for group $GID ==="
            curl -s -H "Authorization: Bearer $TW_TOKEN" \
              "${{ env.TIMEWEB_API }}/api/v1/firewall/groups/$GID/rules" | \
              jq '.rules[] | {id, direction, protocol, port, cidr, description}'
          done

      - name: Firewall Add Rule
        if: inputs.action == 'firewall-add-rule'
        run: |
          # Get first firewall group
          FW_ID=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/firewall/groups" | jq '.groups[0].id // empty')

          if [ -z "$FW_ID" ]; then
            echo "No firewall groups found. Create one via provision workflow first."
            exit 1
          fi

          echo "Adding rule: allow ${{ inputs.firewall_protocol }}/${{ inputs.firewall_port }}"
          curl -s -X POST -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"direction\": \"ingress\", \"protocol\": \"${{ inputs.firewall_protocol }}\", \"port\": ${{ inputs.firewall_port }}, \"cidr\": \"0.0.0.0/0\", \"description\": \"Allow ${{ inputs.firewall_protocol }}/${{ inputs.firewall_port }}\"}" \
            "${{ env.TIMEWEB_API }}/api/v1/firewall/groups/$FW_ID/rules" | jq '.'

      # ==================== SSH KEYS ====================

      - name: SSH Keys List
        if: inputs.action == 'ssh-keys-list'
        run: |
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/ssh-keys" | jq '.ssh_keys[] | {id, name, created_at}'

      # ==================== ACCOUNT ====================

      - name: Account Balance
        if: inputs.action == 'account-balance'
        run: |
          echo "=== Account Finances ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/account/finances" | jq '.'

      - name: Full Account Status
        if: inputs.action == 'account-full-status'
        run: |
          echo "========================================="
          echo "  TIMEWEB FULL STATUS REPORT"
          echo "========================================="

          echo ""
          echo "=== Account ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/account/finances" | jq '.finances | {balance, currency, monthly_cost}'

          echo ""
          echo "=== Servers ==="
          SERVERS=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/servers")
          echo "$SERVERS" | jq '.servers[] | {id, name, status, ip: (.networks[0].ips[0].ip // "none"), cpu, ram: (.ram / 1024 | tostring + " GB"), location}'
          echo "Total servers: $(echo "$SERVERS" | jq '.meta.total')"

          echo ""
          echo "=== Domains ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/domains" | jq '.domains[] | {fqdn, linked_ip, is_technical}'

          echo ""
          echo "=== SSH Keys ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/ssh-keys" | jq '.ssh_keys[] | {id, name}'

          echo ""
          echo "=== Firewall ==="
          curl -s -H "Authorization: Bearer $TW_TOKEN" \
            "${{ env.TIMEWEB_API }}/api/v1/firewall/groups" | jq '.groups[] | {id, name, rules_count}'

          echo ""
          echo "=== Backups ==="
          for SID in $(echo "$SERVERS" | jq -r '.servers[].id // empty'); do
            DISK_ID=$(curl -s -H "Authorization: Bearer $TW_TOKEN" \
              "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/disks" | jq '.disks[0].id // empty')
            if [ -n "$DISK_ID" ]; then
              curl -s -H "Authorization: Bearer $TW_TOKEN" \
                "${{ env.TIMEWEB_API }}/api/v1/servers/$SID/disks/$DISK_ID/backups" | \
                jq '.backups[] | {id, status, comment, created_at}'
            fi
          done

      # ==================== CUSTOM API ====================

      - name: Custom API Call
        if: inputs.action == 'custom-api'
        run: |
          METHOD="${{ inputs.custom_method }}"
          ENDPOINT="${{ inputs.custom_endpoint }}"
          BODY='${{ inputs.custom_body }}'

          echo "=== $METHOD $ENDPOINT ==="
          if [ -n "$BODY" ] && [ "$BODY" != "" ]; then
            curl -s -X "$METHOD" \
              -H "Authorization: Bearer $TW_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "${{ env.TIMEWEB_API }}$ENDPOINT" | jq '.'
          else
            curl -s -X "$METHOD" \
              -H "Authorization: Bearer $TW_TOKEN" \
              -H "Content-Type: application/json" \
              "${{ env.TIMEWEB_API }}$ENDPOINT" | jq '.'
          fi
