name: Run DB Migration (one-shot)

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply migration on production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Apply migration via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Applying migration: add-management-expenses ==="

            docker compose -f /opt/delovoy-park/docker-compose.yml exec -T postgres \
              psql -U delovoy delovoy_park -c "
                -- Create enums
                DO \$\$ BEGIN
                  CREATE TYPE \"ExpenseCategory\" AS ENUM ('IT_INFRASTRUCTURE', 'ADVERTISING', 'TELEPHONY', 'OPERATIONS');
                EXCEPTION WHEN duplicate_object THEN NULL;
                END \$\$;

                DO \$\$ BEGIN
                  CREATE TYPE \"ExpenseFrequency\" AS ENUM ('MONTHLY', 'QUARTERLY', 'YEARLY');
                EXCEPTION WHEN duplicate_object THEN NULL;
                END \$\$;

                -- Create RecurringExpense table
                CREATE TABLE IF NOT EXISTS \"RecurringExpense\" (
                  \"id\" TEXT NOT NULL,
                  \"name\" TEXT NOT NULL,
                  \"description\" TEXT,
                  \"category\" \"ExpenseCategory\" NOT NULL,
                  \"frequency\" \"ExpenseFrequency\" NOT NULL,
                  \"amount\" DECIMAL(65,30) NOT NULL,
                  \"currency\" TEXT NOT NULL DEFAULT 'RUB',
                  \"serviceUrl\" TEXT,
                  \"startDate\" TIMESTAMP(3) NOT NULL,
                  \"nextBillingDate\" TIMESTAMP(3) NOT NULL,
                  \"isActive\" BOOLEAN NOT NULL DEFAULT true,
                  \"deletedAt\" TIMESTAMP(3),
                  \"createdById\" TEXT NOT NULL,
                  \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  \"updatedAt\" TIMESTAMP(3) NOT NULL,
                  CONSTRAINT \"RecurringExpense_pkey\" PRIMARY KEY (\"id\")
                );

                -- Create Expense table
                CREATE TABLE IF NOT EXISTS \"Expense\" (
                  \"id\" TEXT NOT NULL,
                  \"name\" TEXT NOT NULL,
                  \"description\" TEXT,
                  \"category\" \"ExpenseCategory\" NOT NULL,
                  \"amount\" DECIMAL(65,30) NOT NULL,
                  \"currency\" TEXT NOT NULL DEFAULT 'RUB',
                  \"date\" TIMESTAMP(3) NOT NULL,
                  \"isAutoGenerated\" BOOLEAN NOT NULL DEFAULT false,
                  \"recurringExpenseId\" TEXT,
                  \"deletedAt\" TIMESTAMP(3),
                  \"createdById\" TEXT NOT NULL,
                  \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  \"updatedAt\" TIMESTAMP(3) NOT NULL,
                  CONSTRAINT \"Expense_pkey\" PRIMARY KEY (\"id\")
                );

                -- Add foreign key
                ALTER TABLE \"Expense\" ADD CONSTRAINT \"Expense_recurringExpenseId_fkey\"
                  FOREIGN KEY (\"recurringExpenseId\") REFERENCES \"RecurringExpense\"(\"id\")
                  ON DELETE SET NULL ON UPDATE CASCADE;

                -- Create indexes for RecurringExpense
                CREATE INDEX IF NOT EXISTS \"RecurringExpense_isActive_nextBillingDate_idx\"
                  ON \"RecurringExpense\"(\"isActive\", \"nextBillingDate\");
                CREATE INDEX IF NOT EXISTS \"RecurringExpense_category_idx\"
                  ON \"RecurringExpense\"(\"category\");
                CREATE INDEX IF NOT EXISTS \"RecurringExpense_deletedAt_idx\"
                  ON \"RecurringExpense\"(\"deletedAt\");

                -- Create indexes for Expense
                CREATE INDEX IF NOT EXISTS \"Expense_category_date_idx\"
                  ON \"Expense\"(\"category\", \"date\");
                CREATE INDEX IF NOT EXISTS \"Expense_recurringExpenseId_idx\"
                  ON \"Expense\"(\"recurringExpenseId\");
                CREATE INDEX IF NOT EXISTS \"Expense_date_idx\"
                  ON \"Expense\"(\"date\");
                CREATE INDEX IF NOT EXISTS \"Expense_deletedAt_idx\"
                  ON \"Expense\"(\"deletedAt\");
                CREATE INDEX IF NOT EXISTS \"Expense_isAutoGenerated_idx\"
                  ON \"Expense\"(\"isAutoGenerated\");
              "

            echo "=== Verifying tables ==="
            docker compose -f /opt/delovoy-park/docker-compose.yml exec -T postgres \
              psql -U delovoy delovoy_park -c "\dt \"RecurringExpense\"; \dt \"Expense\";"

            echo "=== Migration complete ==="
