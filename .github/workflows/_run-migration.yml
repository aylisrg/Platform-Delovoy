name: Run DB Migration (one-shot)

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply migration on production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Apply migration via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Applying migration: add_user_birthday_gender ==="

            docker compose -f /opt/delovoy-park/docker-compose.yml exec -T postgres \
              psql -U delovoy delovoy_park -c \
              "ALTER TABLE \"User\" ADD COLUMN IF NOT EXISTS \"birthday\" TIMESTAMP(3); ALTER TABLE \"User\" ADD COLUMN IF NOT EXISTS \"gender\" TEXT;"

            echo "=== Verifying columns ==="
            docker compose -f /opt/delovoy-park/docker-compose.yml exec -T postgres \
              psql -U delovoy delovoy_park -c \
              "\d \"User\"" | grep -E "birthday|gender"

            echo "=== Migration complete ==="
