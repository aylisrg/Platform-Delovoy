name: Run Seed on Production

# Manual emergency trigger. Calls the same unified seed pipeline as deploy.yml
# (scripts/seed.ts → seedCore + seedTasks). Idempotent — safe to run any time.
# Источник правды: docs/adr/ADR-0001-unified-seed-pipeline.md

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  seed:
    name: Run unified seed pipeline
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Run seed via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/delovoy-park
            echo "=== Running unified seed pipeline ==="
            docker compose exec -T app npx tsx scripts/seed.ts
            echo "=== Done ==="
