name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true  # OK to cancel staging deploys

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platform-delovoy

jobs:
  build-and-push:
    name: Build & Push Staging Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push staging image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha,scope=staging
          cache-to: type=gha,scope=staging,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/delovoy-park-staging

            echo "=== Pull staging image ==="
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:staging

            echo "=== Deploy staging ==="
            docker compose -f docker-compose.staging.yml up -d --no-deps app

            echo "=== Wait for health check ==="
            HEALTHY=false
            for i in $(seq 1 20); do
              if docker compose -f docker-compose.staging.yml exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Staging health check passed on attempt $i"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/20 — waiting..."
              sleep 5
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Staging deployed successfully"
            else
              echo "❌ Staging health check failed — restarting"
              docker compose -f docker-compose.staging.yml restart app
              exit 1
            fi

      - name: Verify staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Staging verification ==="
            curl -sf http://127.0.0.1:3001/api/health | head -c 200 || echo "Health check unavailable"
            echo ""
            docker ps --filter name=delovoy-staging --format "table {{.Names}}\t{{.Status}}"

      - name: Notify staging deploy
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            STATUS="${{ job.status }}"
            if [ "$STATUS" = "success" ]; then
              EMOJI="🔄"
              TEXT="Staging updated — ${{ github.sha }}"
            else
              EMOJI="⚠️"
              TEXT="Staging deploy failed — ${{ github.sha }}"
            fi
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
              -d "text=${EMOJI} ${TEXT}" \
              -d "parse_mode=HTML" || true
