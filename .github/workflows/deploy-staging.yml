name: Deploy to Staging

on:
  # Only deploy staging after CI passes — prevents broken builds from reaching staging.
  workflow_run:
    workflows: ["CI — Lint, Test, Build"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true  # OK to cancel staging deploys

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platform-delovoy

jobs:
  tag-staging:
    # Gate: only run when triggered by a successful CI run (or manually).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    name: Tag Staging Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Fast path (auto-deploy): promote the sha image built by CI — no rebuild.
      - name: Retag sha image as staging
        if: github.event_name != 'workflow_dispatch'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      # Slow path (manual dispatch): full rebuild in case sha image doesn't exist.
      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch'

      - name: Build and push staging image (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: tag-staging
    steps:
      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            if [ ! -d /opt/delovoy-park-staging ]; then
              echo "⚠️ Staging not set up yet — run scripts/setup-staging.sh first"
              echo "Skipping staging deploy"
              exit 0
            fi

            cd /opt/delovoy-park-staging

            echo "=== Pull staging image ==="
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:staging

            echo "=== Deploy staging ==="
            docker compose -f docker-compose.staging.yml up -d --no-deps app

            echo "=== Wait for health check ==="
            HEALTHY=false
            for i in $(seq 1 20); do
              if docker compose -f docker-compose.staging.yml exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Staging health check passed on attempt $i"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/20 — waiting..."
              sleep 5
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Staging deployed successfully"
            else
              echo "❌ Staging health check failed — restarting"
              docker compose -f docker-compose.staging.yml restart app
              exit 1
            fi

      - name: Verify staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Staging verification ==="
            curl -sf http://127.0.0.1:3001/api/health | head -c 200 || echo "Health check unavailable"
            echo ""
            docker ps --filter name=delovoy-staging --format "table {{.Names}}\t{{.Status}}"

      - name: Notify staging deploy
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram not configured — skipping notification"
            exit 0
          fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TEXT="🔄 Staging updated — ${{ github.sha }}"
          else
            TEXT="⚠️ Staging deploy failed — ${{ github.sha }}"
          fi
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${TEXT}" \
            -d "parse_mode=HTML" || true
