name: Deploy to Staging

# Staging — только manual trigger. Auto-deploy на каждый CI-зелёный коммит в main
# отключён осознанно: для текущего workflow (один разработчик + автоматизированные
# агенты + 1500+ тестов + smoke-чеки в deploy.yml) staging как обязательный буфер
# не оправдывает себя. Шум "staging упал" вытеснял настоящие алерты.
#
# Когда staging НУЖЕН — запускаем явно:
#   - Перед breaking-миграцией (test on staging DB первым)
#   - Перед risky-фичей (нагрузочный smoke)
#   - При откате через выбор конкретного SHA
#
# Запуск: Actions UI → "Deploy to Staging" → Run workflow → опционально SHA / wipe DB.
# Также триггерится из админки /admin/architect/deploy через GITHUB_DISPATCH_TOKEN.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA для деплоя (пусто = latest main)"
        required: false
        default: ""
      wipe_database:
        description: "Сбросить staging БД перед деплоем"
        required: false
        default: "false"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platform-delovoy

jobs:
  tag-staging:
    name: Tag Staging Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      resolved_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve target SHA
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.sha }}" ]; then
            echo "sha=${{ github.event.inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Fast path: re-tag an existing sha-<SHA> image built by CI — no rebuild.
      - name: Retag sha image as staging
        id: retag
        continue-on-error: true
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.sha }}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${TARGET_SHA} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${TARGET_SHA}

      # Slow path (fallback): build from source when sha image missing.
      - uses: actions/checkout@v6
        if: steps.retag.outcome == 'failure'
        with:
          ref: ${{ steps.resolve.outputs.sha }}

      - name: Build and push staging image (fallback)
        if: steps.retag.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ steps.resolve.outputs.sha }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: tag-staging
    steps:
      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            if [ ! -d /opt/delovoy-park-staging ]; then
              echo "⚠️ Staging not set up yet — run scripts/setup-staging.sh first"
              exit 1
            fi

            cd /opt/delovoy-park-staging

            WIPE="${{ github.event.inputs.wipe_database }}"
            if [ "$WIPE" = "true" ]; then
              echo "=== Wiping staging DB (requested) ==="
              docker compose -f docker-compose.staging.yml exec -T postgres \
                psql -U delovoy -d postgres -c \
                "DROP DATABASE IF EXISTS delovoy_park_staging; CREATE DATABASE delovoy_park_staging;"
            fi

            echo "=== Pull staging image ==="
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:staging

            echo "=== Ensure postgres/redis up ==="
            docker compose -f docker-compose.staging.yml up -d postgres redis

            echo "=== Deploy app ==="
            docker compose -f docker-compose.staging.yml up -d --no-deps app

            echo "=== Apply migrations ==="
            docker compose -f docker-compose.staging.yml exec -T app npx prisma migrate deploy || true

            echo "=== Wait for health check ==="
            HEALTHY=false
            for i in $(seq 1 15); do
              if docker compose -f docker-compose.staging.yml exec -T app \
                 wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Staging health check passed on attempt $i"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/15 — waiting…"
              sleep 5
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Staging deployed"
            else
              echo "❌ Staging health check failed — рестартим"
              docker compose -f docker-compose.staging.yml restart app
              exit 1
            fi

      - name: Verify via public URL
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            curl -sf http://127.0.0.1:3001/api/health | head -c 200 || true
            echo ""
            docker ps --filter name=delovoy-staging --format "table {{.Names}}\t{{.Status}}"

      - name: Notify staging deploy
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_STAGING_BOT_TOKEN || secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_STAGING_CHAT_ID || secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TARGET_SHA: ${{ needs.tag-staging.outputs.resolved_sha }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram not configured — skipping"
            exit 0
          fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TEXT="🔄 Staging updated — ${TARGET_SHA}"
          else
            TEXT="⚠️ Staging deploy failed — ${TARGET_SHA}"
          fi
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${TEXT}" || true
