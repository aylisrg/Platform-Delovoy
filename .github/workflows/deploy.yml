name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST || '5.129.255.244' }}
        run: |
          set -e
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ConnectTimeout=15 root@${VPS_HOST}"

          echo "=== Connecting to VPS ${VPS_HOST}... ==="

          # Retry SSH connection up to 3 times
          for attempt in 1 2 3; do
            if $SSH 'echo "SSH OK: $(hostname) $(date -u)"'; then
              break
            fi
            echo "SSH attempt $attempt failed, retrying in 5s..."
            sleep 5
            if [ "$attempt" = "3" ]; then
              echo "ERROR: Cannot connect to VPS after 3 attempts"
              exit 1
            fi
          done

          echo "[1/6] Stopping ALL app containers..."
          $SSH '
            docker stop delovoy-app 2>/dev/null || true
            docker rm delovoy-app 2>/dev/null || true
          '

          echo "[2/6] AGGRESSIVE disk cleanup..."
          $SSH '
            echo "=== Disk BEFORE cleanup ==="
            df -h /
            du -sh /var/lib/docker/ 2>/dev/null || true
            echo ""

            echo "--- Removing ALL stopped containers ---"
            docker container prune -f 2>/dev/null || true

            echo "--- Removing ALL unused images (including tagged) ---"
            docker image prune -af 2>/dev/null || true

            echo "--- Removing ALL build cache ---"
            docker builder prune -af 2>/dev/null || true

            echo "--- Removing dangling volumes ---"
            docker volume prune -f 2>/dev/null || true

            echo "--- System-wide Docker cleanup ---"
            docker system prune -af 2>/dev/null || true

            echo "--- Cleaning system caches ---"
            apt-get clean 2>/dev/null || true
            apt-get autoremove -y 2>/dev/null || true
            rm -rf /var/cache/apt/archives/* 2>/dev/null || true
            rm -rf /var/lib/apt/lists/* 2>/dev/null || true

            echo "--- Truncating logs ---"
            journalctl --vacuum-size=30M 2>/dev/null || true
            find /var/log -name "*.gz" -delete 2>/dev/null || true
            find /var/log -name "*.old" -delete 2>/dev/null || true
            find /var/log -name "*.1" -delete 2>/dev/null || true
            truncate -s 0 /var/log/syslog 2>/dev/null || true
            truncate -s 0 /var/log/kern.log 2>/dev/null || true

            echo "--- Cleaning temp files ---"
            rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
            rm -rf /root/.npm/_cacache 2>/dev/null || true
            rm -rf /home/*/.npm/_cacache 2>/dev/null || true

            echo ""
            echo "=== Disk AFTER cleanup ==="
            df -h /
            echo ""
            echo "Largest dirs in /var/lib/docker:"
            du -sh /var/lib/docker/*/ 2>/dev/null | sort -rh | head -5 || true
          '

          echo "[3/6] Updating repository..."
          $SSH 'cd /opt/delovoy/app && git fetch origin main && git checkout main -f && git reset --hard origin/main'

          echo "[4/6] Pulling image from GHCR..."
          # Retry docker pull up to 3 times (network issues in Russia)
          $SSH '
            for i in 1 2 3; do
              if docker pull ghcr.io/aylisrg/platform-delovoy:latest; then
                break
              fi
              echo "Pull attempt $i failed, retrying in 10s..."
              sleep 10
              if [ "$i" = "3" ]; then
                echo "ERROR: Cannot pull image after 3 attempts"
                echo "Disk space:"
                df -h /
                exit 1
              fi
            done
          '

          echo "[5/6] Restarting containers..."
          $SSH 'cd /opt/delovoy/app && docker compose --env-file /opt/delovoy/.env up -d --no-build --remove-orphans'

          echo "[6/6] Waiting for health check..."
          for i in $(seq 1 30); do
            STATUS=$($SSH 'docker inspect --format={{.State.Health.Status}} delovoy-app 2>/dev/null || echo starting')
            echo "  Status: $STATUS (attempt ${i}/30)"
            if [ "$STATUS" = "healthy" ]; then
              echo ""
              echo "=== Deploy successful! ==="
              $SSH 'curl -s http://localhost/api/health || true'
              exit 0
            fi
            sleep 5
          done

          echo ""
          echo "ERROR: App not healthy after 150s"
          echo "--- Container logs ---"
          $SSH 'cd /opt/delovoy/app && docker compose --env-file /opt/delovoy/.env logs --tail=80 app'
          echo ""
          echo "--- Container state ---"
          $SSH 'docker inspect --format="{{.State.Status}} {{.State.ExitCode}} {{.State.Error}}" delovoy-app 2>/dev/null || echo "container not found"'
          exit 1

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check app health
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '5.129.255.244' }}
        run: |
          URL="http://${VPS_HOST}/api/health"
          echo "Polling: $URL"
          echo ""
          for i in $(seq 1 12); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" --connect-timeout 10 --max-time 15 "$URL" 2>/dev/null || echo "000")
            BODY=$(cat /tmp/health.json 2>/dev/null || echo "")
            if [ "$HTTP" = "200" ]; then
              echo "Deployment verified successfully!"
              echo "  URL: http://${VPS_HOST}"
              echo "  Health: $BODY"
              exit 0
            fi
            echo "  [$(date +%H:%M:%S)] attempt $i/12 — HTTP $HTTP, retrying in 10s..."
            sleep 10
          done
          echo ""
          echo "App did not respond after 2 minutes"
          exit 1
