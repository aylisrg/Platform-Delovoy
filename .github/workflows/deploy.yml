name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy-report.txt'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix SSH and Deploy
        env:
          TW_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          set +e
          REPORT="deploy-report.txt"
          echo "=== DEPLOY REPORT $(date -u) ===" > $REPORT

          # 1. Reboot server to fix SSH
          echo "" >> $REPORT
          echo "--- STEP 1: Reboot server via Timeweb API ---" >> $REPORT
          REBOOT=$(curl -sf -X POST \
            -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"action":"reboot"}' \
            "https://api.timeweb.cloud/api/v1/servers/7215757/action" 2>&1)
          echo "Reboot response: $REBOOT" >> $REPORT

          # Wait for reboot
          echo "Waiting 60s for reboot..." >> $REPORT
          sleep 60

          # 2. Check if SSH is now open
          echo "" >> $REPORT
          echo "--- STEP 2: Post-reboot port scan ---" >> $REPORT
          for i in 1 2 3 4 5; do
            timeout 5 bash -c 'echo | nc -w3 45.144.222.103 22' 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "Attempt $i: Port 22 OPEN" >> $REPORT
              break
            else
              echo "Attempt $i: Port 22 still closed, waiting 15s..." >> $REPORT
              sleep 15
            fi
          done

          # Final port check
          for port in 22 80; do
            timeout 5 bash -c "echo | nc -w3 45.144.222.103 $port" 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "Port $port: OPEN" >> $REPORT
            else
              echo "Port $port: CLOSED" >> $REPORT
            fi
          done

          # 3. Try SSH after reboot
          echo "" >> $REPORT
          echo "--- STEP 3: SSH connection ---" >> $REPORT
          apt-get update -qq > /dev/null 2>&1 && apt-get install -y -qq sshpass > /dev/null 2>&1

          SSH_OUT=$(sshpass -p 'x5EKRBsc443x--' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@45.144.222.103 'echo SSH_OK && uname -a' 2>&1)
          SSH_EXIT=$?
          echo "SSH exit code: $SSH_EXIT" >> $REPORT
          echo "$SSH_OUT" | tail -10 >> $REPORT

          # 4. Deploy if SSH works
          if echo "$SSH_OUT" | grep -q "SSH_OK"; then
            echo "" >> $REPORT
            echo "--- STEP 4: Deploying ---" >> $REPORT
            sshpass -p 'x5EKRBsc443x--' ssh -o StrictHostKeyChecking=no root@45.144.222.103 'bash -s' << 'REMOTESCRIPT'
              set -e
              echo "Installing Docker..."
              which docker || curl -fsSL https://get.docker.com | sh
              echo "Installing git..."
              which git || (apt-get update && apt-get install -y git)
              echo "Cleaning old deploy..."
              [ -d "/opt/delovoy" ] && (cd /opt/delovoy && docker compose down 2>/dev/null || true)
              rm -rf /opt/delovoy
              echo "Cloning repo..."
              mkdir -p /opt/delovoy
              git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
              echo "Running deploy script..."
              cd /opt/delovoy/app && bash scripts/deploy-full.sh
              echo "Checking status..."
              sleep 15
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost 2>&1)
              echo "HTTP localhost: $HTTP_CODE"
              docker compose -f /opt/delovoy/docker-compose.yml ps 2>/dev/null || true
              echo "DEPLOY_COMPLETE"
REMOTESCRIPT
            DEPLOY_EXIT=$?
            echo "Deploy exit code: $DEPLOY_EXIT" >> $REPORT
            echo "Deploy: ATTEMPTED" >> $REPORT
          else
            echo "" >> $REPORT
            echo "--- DEPLOY SKIPPED (SSH still failed) ---" >> $REPORT
            echo "SSH is still not available after reboot." >> $REPORT
            echo "Possible fix: use Timeweb API to reinstall OS or enable SSH." >> $REPORT
          fi

          # 5. Final HTTP check
          echo "" >> $REPORT
          echo "--- STEP 5: Final HTTP check ---" >> $REPORT
          HTTP_FINAL=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://45.144.222.103/ 2>&1)
          echo "HTTP 45.144.222.103: $HTTP_FINAL" >> $REPORT

          cat $REPORT

          # Commit report
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $REPORT
          git diff --cached --quiet || git commit -m "ci: deploy report $(date -u +%H:%M) [skip ci]"
          git push || true

          # Fail if deploy didn't work
          if echo "$SSH_OUT" | grep -q "SSH_OK"; then
            exit 0
          else
            exit 1
          fi
