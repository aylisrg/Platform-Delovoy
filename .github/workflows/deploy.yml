name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Add VPS host key to known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -z "${VPS_HOST}" ]; then
            echo "ERROR: VPS_HOST secret is not set"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -e
          SSH_OPTS=(-o ServerAliveInterval=30 -o ConnectTimeout=15)
          SSH_CMD=(sshpass -e ssh "${SSH_OPTS[@]}" "root@${VPS_HOST}")

          echo "=== Connecting to VPS ${VPS_HOST}... ==="
          "${SSH_CMD[@]}" 'echo "SSH OK: $(hostname) $(date -u)"'

          echo "[1/4] Updating repository..."
          "${SSH_CMD[@]}" 'cd /opt/delovoy/app && git fetch origin main && git checkout main -f && git reset --hard origin/main'

          echo "[2/4] Pulling image from GHCR..."
          "${SSH_CMD[@]}" 'docker pull ghcr.io/aylisrg/platform-delovoy:latest'

          echo "[3/4] Restarting app container..."
          "${SSH_CMD[@]}" 'cd /opt/delovoy/app && docker compose --env-file /opt/delovoy/.env up -d --no-build --remove-orphans'

          echo "[4/4] Waiting for health check..."
          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$("${SSH_CMD[@]}" 'docker inspect --format={{.State.Health.Status}} delovoy-app 2>/dev/null || echo starting')
            echo "  Status: $STATUS (${ELAPSED}s / ${TIMEOUT}s)"
            if [ "$STATUS" = "healthy" ]; then
              echo ""
              echo "=== Deploy successful! ==="
              "${SSH_CMD[@]}" 'curl -s http://localhost/api/health || true'
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          echo "ERROR: App not healthy after ${TIMEOUT}s"
          "${SSH_CMD[@]}" 'cd /opt/delovoy/app && docker compose --env-file /opt/delovoy/.env logs --tail=50 app'
          exit 1
