name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST || '5.129.255.244' }}
        run: |
          set -e
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ConnectTimeout=15 root@${VPS_HOST}"

          echo "=== Connecting to VPS ${VPS_HOST}... ==="
          $SSH 'echo "SSH OK: $(hostname) $(date -u)"'

          echo "[1/5] Stopping crash-looping container (if any)..."
          $SSH 'docker stop delovoy-app 2>/dev/null || true'

          echo "[2/5] Updating repository..."
          $SSH 'cd /opt/delovoy/app && git fetch origin main && git checkout main -f && git reset --hard origin/main'

          echo "[3/5] Pulling image from GHCR..."
          $SSH 'docker pull ghcr.io/aylisrg/platform-delovoy:latest'

          echo "[4/5] Restarting app container..."
          $SSH 'cd /opt/delovoy/app && docker compose --env-file /opt/delovoy/.env up -d --no-build --remove-orphans'

          echo "[5/5] Waiting for health check..."
          for i in $(seq 1 24); do
            STATUS=$($SSH 'docker inspect --format={{.State.Health.Status}} delovoy-app 2>/dev/null || echo starting')
            echo "  Status: $STATUS (${i}x5s)"
            if [ "$STATUS" = "healthy" ]; then
              echo ""
              echo "=== Deploy successful! ==="
              $SSH 'curl -s http://localhost/api/health || true'
              exit 0
            fi
            sleep 5
          done

          echo "ERROR: App not healthy after 120s"
          $SSH 'cd /opt/delovoy/app && docker compose --env-file /opt/delovoy/.env logs --tail=50 app'
          exit 1

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Check app health
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '5.129.255.244' }}
        run: |
          URL="http://${VPS_HOST}/api/health"
          echo "Polling: $URL"
          echo ""
          for i in $(seq 1 24); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            BODY=$(cat /tmp/health.json 2>/dev/null || echo "")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Deployment successful!"
              echo "   URL: http://${VPS_HOST}"
              echo ""
              echo "Health: $BODY"
              exit 0
            fi
            echo "  [$(date +%H:%M:%S)] attempt $i/24 — HTTP $HTTP, retrying in 15s..."
            sleep 15
          done
          echo ""
          echo "❌ App did not respond after 6 minutes"
          exit 1
