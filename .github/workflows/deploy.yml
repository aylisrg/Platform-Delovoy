name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      skip_snapshot:
        description: "Skip Timeweb snapshot before deploy"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a deploy in progress

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platform-delovoy

jobs:
  # Gate: CI must pass first (ci.yml runs on push to main too)
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Timeweb VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create Timeweb snapshot before deploy
        if: ${{ !inputs.skip_snapshot }}
        continue-on-error: true
        env:
          TIMEWEB_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          if [ -z "$TIMEWEB_TOKEN" ]; then
            echo "No TIMEWEB_API_TOKEN — skipping snapshot"
            exit 0
          fi

          # Get server ID
          SERVER_ID=$(curl -s -H "Authorization: Bearer $TIMEWEB_TOKEN" \
            "https://api.timeweb.cloud/api/v1/servers" | jq '.servers[0].id // empty')

          if [ -n "$SERVER_ID" ]; then
            echo "Creating snapshot for server $SERVER_ID before deploy..."
            curl -s -X POST \
              -H "Authorization: Bearer $TIMEWEB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"comment\": \"Pre-deploy snapshot — ${{ github.sha }}\"}" \
              "https://api.timeweb.cloud/api/v1/servers/$SERVER_ID/disks/backups" | jq '.'
            echo "Snapshot requested"
          else
            echo "No server found — skipping snapshot"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/delovoy-park

            echo "=== Pull new image ==="
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            echo "=== Backup current state ==="
            docker compose exec -T postgres pg_dump -U delovoy delovoy_park | gzip > /opt/backups/db-$(date +%Y%m%d-%H%M%S).sql.gz

            echo "=== Save current image for rollback ==="
            CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' delovoy-park-app-1 2>/dev/null || echo "")
            echo "Current image: ${CURRENT_IMAGE:-none}"

            echo "=== Rolling deploy ==="
            docker compose up -d --no-deps app

            echo "=== Wait for health check ==="
            HEALTHY=false
            for i in $(seq 1 30); do
              if docker compose exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Health check passed on attempt $i"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/30 — waiting..."
              sleep 5
            done

            if [ "$HEALTHY" = true ]; then
              exit 0
            fi

            echo "FATAL: Health check failed after 30 attempts"
            echo "=== Rolling back ==="
            if [ -n "$CURRENT_IMAGE" ]; then
              echo "Rolling back to: $CURRENT_IMAGE"
              docker pull "$CURRENT_IMAGE" 2>/dev/null || true
              DEPLOY_IMAGE="$CURRENT_IMAGE" docker compose up -d --no-deps app
              echo "Rollback complete — waiting for health check..."
              sleep 10
              if docker compose exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Rollback health check PASSED"
              else
                echo "WARNING: Rollback health check also failed — manual intervention needed"
              fi
            else
              echo "No previous image found — restarting current container"
              docker compose restart app
            fi
            exit 1

      - name: Verify deployment + smoke tests
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Health check ==="
            curl -sf https://delovoy-park.ru/api/health | head -c 200
            echo ""

            echo "=== Smoke tests ==="
            FAILED=0

            # Main page loads
            if curl -sf -o /dev/null -w "%{http_code}" https://delovoy-park.ru/ | grep -q "200"; then
              echo "✅ Main page: 200 OK"
            else
              echo "❌ Main page: FAILED"
              FAILED=$((FAILED + 1))
            fi

            # PS Park page loads
            if curl -sf -o /dev/null -w "%{http_code}" https://delovoy-park.ru/ps-park | grep -q "200"; then
              echo "✅ PS Park page: 200 OK"
            else
              echo "❌ PS Park page: FAILED"
              FAILED=$((FAILED + 1))
            fi

            # API responds with JSON
            if curl -sf https://delovoy-park.ru/api/ps-park/health | grep -q "status"; then
              echo "✅ PS Park API health: OK"
            else
              echo "❌ PS Park API health: FAILED"
              FAILED=$((FAILED + 1))
            fi

            echo ""
            echo "=== Container status ==="
            docker ps --filter name=delovoy --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            if [ "$FAILED" -gt 0 ]; then
              echo "⚠️ $FAILED smoke test(s) failed — deploy succeeded but check manually"
            fi

      - name: Notify on success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=✅ Deploy OK — v${{ needs.build-and-push.outputs.version }} (${{ github.sha }})" \
            -d "parse_mode=HTML" || true

      - name: Send release notification to subscribers
        if: success()
        env:
          RELEASE_NOTIFY_SECRET: ${{ secrets.RELEASE_NOTIFY_SECRET }}
          APP_URL: https://delovoy-park.ru
        run: |
          [ -z "$RELEASE_NOTIFY_SECRET" ] && echo "RELEASE_NOTIFY_SECRET not set, skipping" && exit 0

          # Read release notes (docs/releases/current.md), strip the header comment block
          NOTES=""
          if [ -f "docs/releases/current.md" ]; then
            # Remove lines starting with > (comments) and the H1 heading, trim blank lines at start
            NOTES=$(sed '/^> /d;/^# /d' docs/releases/current.md | sed '/^[[:space:]]*$/d' | head -60)
          fi

          VERSION="${{ needs.build-and-push.outputs.version }}"
          COMMIT_SHA="${{ github.sha }}"
          DEPLOYED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Escape for JSON (basic — newlines → \n)
          NOTES_JSON=$(printf '%s' "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          PAYLOAD=$(cat <<EOF
          {
            "secret": "$RELEASE_NOTIFY_SECRET",
            "version": "$VERSION",
            "releaseNotes": $NOTES_JSON,
            "commitSha": "$COMMIT_SHA",
            "deployedAt": "$DEPLOYED_AT"
          }
          EOF
          )

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${APP_URL}/api/admin/release-notify")

          echo "Release notify response: $RESPONSE"

          # Archive current.md → docs/releases/{version}-{date}.md and reset template
          ARCHIVE_NAME="docs/releases/${VERSION}-$(date +%Y-%m-%d).md"
          if [ -f "docs/releases/current.md" ]; then
            cp docs/releases/current.md "$ARCHIVE_NAME" || true
            git config user.email "ci@delovoy-park.ru"
            git config user.name "Delovoy CI"
            git add "$ARCHIVE_NAME" || true
            cat > docs/releases/current.md << 'TEMPLATE'
          # Что выкатилось в этом релизе

          > Заполни этот файл перед деплоем. После успешного деплоя файл архивируется автоматически.

          ## Новое

          -

          ## Исправлено

          -

          ## Технические изменения

          -
          TEMPLATE
            # Strip leading whitespace from heredoc (YAML indentation artifact)
            sed -i 's/^          //' docs/releases/current.md
            git add docs/releases/current.md || true
            git diff --staged --quiet || git commit -m "chore(releases): archive v${VERSION} release notes [skip ci]" || true
            git push origin HEAD || true
          fi

      - name: Notify on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=🚨 Deploy FAILED — commit ${{ github.sha }}" \
            -d "parse_mode=HTML" || true
