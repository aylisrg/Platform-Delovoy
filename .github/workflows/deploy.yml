name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST || '5.129.255.244' }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            echo "=== Deploy started: $(date -u) ==="

            APP_DIR="/opt/delovoy/app"

            # --- 1. Update repository ---
            echo "[1/4] Updating repository..."
            cd "$APP_DIR"
            git fetch origin main
            git checkout main -f
            git reset --hard origin/main

            # --- 2. Pull pre-built image ---
            echo "[2/4] Pulling image from GHCR..."
            docker pull ghcr.io/aylisrg/platform-delovoy:latest

            # --- 3. Restart app (postgres & redis stay up) ---
            echo "[3/4] Restarting app container..."
            docker compose --env-file /opt/delovoy/.env up -d --no-build --remove-orphans

            # --- 4. Wait for health check ---
            echo "[4/4] Waiting for app to become healthy..."
            TIMEOUT=120
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' delovoy-app 2>/dev/null || echo "starting")
                if [ "$STATUS" = "healthy" ]; then
                    echo "App is healthy! (${ELAPSED}s)"
                    break
                fi
                echo "  Status: $STATUS (${ELAPSED}s / ${TIMEOUT}s)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
            done

            if [ "$STATUS" != "healthy" ]; then
                echo "ERROR: App did not become healthy within ${TIMEOUT}s"
                echo "--- Container logs ---"
                docker compose --env-file /opt/delovoy/.env logs --tail=50 app
                exit 1
            fi

            echo ""
            echo "=== Deploy successful: $(date -u) ==="
            echo "=== Site: http://$(hostname -I | awk '{print $1}') ==="
