name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy-report.txt'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reinstall VPS OS via Timeweb API
        env:
          TW_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          exec > >(tee deploy-report.txt) 2>&1
          echo "=== $(date -u) ==="

          echo "Step 1: Reinstall OS (Ubuntu 22.04 id=79)"
          curl -v -X POST \
            -H "Authorization: Bearer $TW_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"os_id":79}' \
            "https://api.timeweb.cloud/api/v1/servers/7215757/reinstall" 2>&1 || true

          echo ""
          echo "Step 2: Wait 3 minutes for reinstall"
          sleep 180

          echo ""
          echo "Step 3: Port scan"
          for p in 22 80 443; do
            timeout 5 bash -c "echo >/dev/tcp/45.144.222.103/$p" 2>/dev/null && echo "Port $p: OPEN" || echo "Port $p: CLOSED"
          done

          echo ""
          echo "Step 4: SSH test"
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -p 'x5EKRBsc443x--' ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@45.144.222.103 'echo SSH_CONNECTED; uname -a; uptime' 2>&1 || true

          echo ""
          echo "Step 5: If SSH OK, deploy"
          sshpass -p 'x5EKRBsc443x--' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@45.144.222.103 'which docker && echo DOCKER_OK || echo NEED_DOCKER' 2>&1 || echo "SSH_FAILED"

      - name: Commit report
        if: always()
        run: |
          git pull origin main --rebase || true
          git config user.name "deploy-bot"
          git config user.email "bot@delovoy-park.ru"
          git add -f deploy-report.txt
          git diff --cached --quiet || git commit -m "deploy: report $(date -u +%H:%M) [skip ci]"
          git push origin main || true
