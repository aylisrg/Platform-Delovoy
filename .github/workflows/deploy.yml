name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy-report.txt'
      - '*.md'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            which docker || curl -fsSL https://get.docker.com | sh
            which git || (apt-get update && apt-get install -y git)

            if [ -d "/opt/delovoy/app" ]; then
              cd /opt/delovoy/app
              git pull origin main
            else
              mkdir -p /opt/delovoy
              git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
            fi

            cd /opt/delovoy/app
            bash scripts/deploy-full.sh
            echo "Deployed at $(date)"
