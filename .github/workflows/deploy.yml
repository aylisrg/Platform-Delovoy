name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy-report.txt'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to VPS
        run: |
          exec > >(tee deploy-report.txt) 2>&1
          echo "=== $(date -u) ==="

          # Install sshpass
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

          NEW_IP="5.129.255.244"
          PASS='f.?Us+JKJy3S?8'

          echo "Step 1: Port scan"
          for p in 22 80 443; do
            timeout 5 bash -c "echo | nc -w3 $NEW_IP $p" 2>/dev/null && echo "Port $p: OPEN" || echo "Port $p: CLOSED"
          done

          echo ""
          echo "Step 2: SSH test"
          SSH_OUT=$(sshpass -p "$PASS" ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$NEW_IP 'echo SSH_OK; uname -a; uptime; docker ps 2>/dev/null || echo NO_DOCKER; cat /var/log/deploy.log 2>/dev/null | tail -20 || echo NO_LOG' 2>&1)
          echo "$SSH_OUT" | tail -30

          echo ""
          echo "Step 3: Deploy if SSH works"
          if echo "$SSH_OUT" | grep -q "SSH_OK"; then
            echo "SSH connected! Deploying..."
            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no root@$NEW_IP 'bash -s' << 'REMOTE'
              set -e
              which docker || curl -fsSL https://get.docker.com | sh
              which git || (apt-get update && apt-get install -y git)
              [ -d "/opt/delovoy/app" ] || {
                mkdir -p /opt/delovoy
                git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
              }
              cd /opt/delovoy/app
              git pull origin main || true
              bash scripts/deploy-full.sh
              echo "DEPLOY_COMPLETE"
          REMOTE
          else
            echo "SSH FAILED — cannot deploy"
          fi

          echo ""
          echo "Step 4: HTTP check"
          curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 "http://$NEW_IP/" 2>&1 || echo "HTTP_FAILED"
          echo ""

      - name: Commit report
        if: always()
        run: |
          git pull origin main --rebase || true
          git config user.name "deploy-bot"
          git config user.email "bot@delovoy-park.ru"
          git add -f deploy-report.txt
          git diff --cached --quiet || git commit -m "deploy: report $(date -u +%H:%M) [skip ci]"
          git push origin main || true
