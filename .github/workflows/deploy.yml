name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a deploy in progress

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Gate: CI must pass first (ci.yml runs on push to main too)
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Timeweb VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Create Timeweb snapshot before deploy
        continue-on-error: true
        env:
          TIMEWEB_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          if [ -z "$TIMEWEB_TOKEN" ]; then
            echo "No TIMEWEB_API_TOKEN — skipping snapshot"
            exit 0
          fi

          # Get server ID
          SERVER_ID=$(curl -s -H "Authorization: Bearer $TIMEWEB_TOKEN" \
            "https://api.timeweb.cloud/api/v1/servers" | jq '.servers[0].id // empty')

          if [ -n "$SERVER_ID" ]; then
            echo "Creating snapshot for server $SERVER_ID before deploy..."
            curl -s -X POST \
              -H "Authorization: Bearer $TIMEWEB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"comment\": \"Pre-deploy snapshot — ${{ github.sha }}\"}" \
              "https://api.timeweb.cloud/api/v1/servers/$SERVER_ID/disks/backups" | jq '.'
            echo "Snapshot requested"
          else
            echo "No server found — skipping snapshot"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/delovoy-park

            echo "=== Pull new image ==="
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "=== Backup current state ==="
            docker compose exec -T postgres pg_dump -U delovoy delovoy_park | gzip > /opt/backups/db-$(date +%Y%m%d-%H%M%S).sql.gz

            echo "=== Rolling deploy ==="
            docker compose up -d --no-deps app

            echo "=== Wait for health check ==="
            for i in $(seq 1 30); do
              if docker compose exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i/30 — waiting..."
              sleep 5
            done

            echo "FATAL: Health check failed after 30 attempts"
            echo "=== Rolling back ==="
            docker compose rollback app 2>/dev/null || docker compose up -d --no-deps app
            exit 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Deployment verification ==="
            curl -sf https://delovoy-park.ru/api/health | head -c 200
            echo ""
            echo "=== Container status ==="
            docker ps --filter name=delovoy --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Deploy failed — sending alert"
            # Telegram alert via existing bot infrastructure
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
              -d "text=🚨 Deploy FAILED — commit ${{ github.sha }}" \
              -d "parse_mode=HTML" || true
