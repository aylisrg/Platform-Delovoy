name: Deploy to Production

on:
  # Auto-deploy: triggers when CI passes on main. Runs immediately — no wait timer.
  # If you need a cooldown in the future, configure it per-environment in
  # GitHub Settings → Environments → production → Wait timer.
  workflow_run:
    workflows: ["CI \u2014 Lint, Test, Build"]
    types: [completed]
    branches: [main]

  # Manual trigger for hotfixes, emergency re-deploys, or targeted rollouts.
  # Fast path retags an existing sha-<SHA> image from GHCR — no rebuild.
  # Skip flags trade safety for speed; use them only when you know what you're doing.
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (empty = current main HEAD)"
        required: false
        default: ""
      skip_snapshot:
        description: "Skip Timeweb VPS snapshot (~30s)"
        type: boolean
        default: false
      skip_db_backup:
        description: "Skip pg_dump before deploy (~30-60s) — hotfix only"
        type: boolean
        default: false
      skip_smoke_tests:
        description: "Skip post-deploy smoke tests (~10s) — hotfix only"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a deploy in progress

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platform-delovoy

jobs:
  # Gate: only run when triggered by a successful CI run (or manually).
  build-and-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    name: Tag Production Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      resolved_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve target SHA
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.sha }}" ]; then
            echo "sha=${{ github.event.inputs.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.sha }}

      - name: Extract version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Fast path: retag sha image already built by CI — no rebuild.
      # Works for auto-deploy AND hotfix-dispatch (if the SHA was built by CI).
      - name: Retag sha image as production
        id: retag
        continue-on-error: true
        run: |
          TARGET_SHA="${{ steps.resolve.outputs.sha }}"
          SHORT_SHA=$(echo "$TARGET_SHA" | cut -c1-7)
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${TARGET_SHA}

      # Slow path (fallback): full rebuild when sha image is missing from GHCR.
      - name: Build and push (fallback)
        if: steps.retag.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ steps.resolve.outputs.sha }}
            BUILD_TIME=${{ github.event.workflow_run.head_commit.timestamp || github.event.head_commit.timestamp }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.resolve.outputs.sha }}

  deploy:
    name: Deploy to Timeweb VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create Timeweb snapshot before deploy
        if: ${{ !inputs.skip_snapshot }}
        continue-on-error: true
        env:
          TIMEWEB_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          if [ -z "$TIMEWEB_TOKEN" ]; then
            echo "No TIMEWEB_API_TOKEN — skipping snapshot"
            exit 0
          fi

          # Get server ID
          SERVER_ID=$(curl -s -H "Authorization: Bearer $TIMEWEB_TOKEN" \
            "https://api.timeweb.cloud/api/v1/servers" | jq '.servers[0].id // empty')

          if [ -n "$SERVER_ID" ]; then
            echo "Creating snapshot for server $SERVER_ID before deploy..."
            curl -s -X POST \
              -H "Authorization: Bearer $TIMEWEB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"comment\": \"Pre-deploy snapshot — ${{ github.sha }}\"}" \
              "https://api.timeweb.cloud/api/v1/servers/$SERVER_ID/disks/backups" | jq '.'
            echo "Snapshot requested"
          else
            echo "No server found — skipping snapshot"
          fi

      - name: Sync secrets to server .env
        uses: appleboy/ssh-action@v1
        env:
          NOVOFON_API_KEY: ${{ secrets.NOVOFON_API_KEY }}
          NOVOFON_WEBHOOK_SECRET: ${{ secrets.NOVOFON_WEBHOOK_SECRET }}
          NOVOFON_DEFAULT_SIP_LINE: ${{ secrets.NOVOFON_DEFAULT_SIP_LINE }}
          NOVOFON_CALLER_ID: ${{ secrets.NOVOFON_CALLER_ID }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: NOVOFON_API_KEY,NOVOFON_WEBHOOK_SECRET,NOVOFON_DEFAULT_SIP_LINE,NOVOFON_CALLER_ID,YANDEX_CLIENT_ID,YANDEX_CLIENT_SECRET,SMTP_USER,SMTP_PASS,SMTP_FROM
          script: |
            set -e
            cd /opt/delovoy-park

            # Write or update a key in .env without touching other lines
            upsert_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            upsert_env NOVOFON_API_KEY           "$NOVOFON_API_KEY"
            upsert_env NOVOFON_WEBHOOK_SECRET     "$NOVOFON_WEBHOOK_SECRET"
            upsert_env NOVOFON_DEFAULT_SIP_LINE   "$NOVOFON_DEFAULT_SIP_LINE"
            upsert_env NOVOFON_CALLER_ID          "$NOVOFON_CALLER_ID"
            upsert_env YANDEX_CLIENT_ID           "$YANDEX_CLIENT_ID"
            upsert_env YANDEX_CLIENT_SECRET       "$YANDEX_CLIENT_SECRET"
            upsert_env SMTP_USER                  "$SMTP_USER"
            upsert_env SMTP_PASS                  "$SMTP_PASS"
            upsert_env SMTP_FROM                  "$SMTP_FROM"

            echo "Secrets synced to .env"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SKIP_DB_BACKUP: ${{ inputs.skip_db_backup }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SKIP_DB_BACKUP
          script: |
            set -e
            cd /opt/delovoy-park

            echo "=== Pull new image ==="
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            if [ "$SKIP_DB_BACKUP" = "true" ]; then
              echo "=== Backup skipped (skip_db_backup=true) ==="
            else
              echo "=== Backup current state ==="
              docker compose exec -T postgres pg_dump -U delovoy delovoy_park | gzip > /opt/backups/db-$(date +%Y%m%d-%H%M%S).sql.gz
            fi

            echo "=== Save current image for rollback ==="
            CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' delovoy-park-app-1 2>/dev/null || echo "")
            echo "Current image: ${CURRENT_IMAGE:-none}"

            echo "=== Rolling deploy ==="
            docker compose up -d --no-deps app

            echo "=== Wait for health check ==="
            HEALTHY=false
            for i in $(seq 1 30); do
              if docker compose exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Health check passed on attempt $i"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/30 — waiting..."
              sleep 5
            done

            if [ "$HEALTHY" = true ]; then
              echo "=== Run unified seed pipeline ==="
              # Idempotent reference-data seed (modules, boards, categories, demo offices, etc).
              # See docs/adr/ADR-0001-unified-seed-pipeline.md
              # Failure here is a deploy failure — without seed Tasks/etc are broken.
              docker compose exec -T app npx tsx scripts/seed.ts \
                && echo "✅ Seed pipeline OK" \
                || { echo "❌ Seed pipeline FAILED"; exit 1; }

              echo "=== Run data migrations ==="
              docker compose exec -T app npx tsx scripts/set-public-phone.ts \
                && echo "✅ Phone config applied" \
                || echo "⚠️ set-public-phone.ts failed — check manually"
              exit 0
            fi

            echo "FATAL: Health check failed after 30 attempts"
            echo "=== Rolling back ==="
            if [ -n "$CURRENT_IMAGE" ]; then
              echo "Rolling back to: $CURRENT_IMAGE"
              docker pull "$CURRENT_IMAGE" 2>/dev/null || true
              DEPLOY_IMAGE="$CURRENT_IMAGE" docker compose up -d --no-deps app
              echo "Rollback complete — waiting for health check..."
              sleep 10
              if docker compose exec -T app wget --spider --quiet --timeout=5 http://localhost:3000/api/health 2>/dev/null; then
                echo "Rollback health check PASSED"
              else
                echo "WARNING: Rollback health check also failed — manual intervention needed"
              fi
            else
              echo "No previous image found — restarting current container"
              docker compose restart app
            fi
            exit 1

      - name: Verify deployment + smoke tests
        if: ${{ !inputs.skip_smoke_tests }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Health check ==="
            curl -sf https://delovoy-park.ru/api/health | head -c 200
            echo ""

            echo "=== Smoke tests ==="
            FAILED=0

            # Main page loads
            if curl -sf -o /dev/null -w "%{http_code}" https://delovoy-park.ru/ | grep -q "200"; then
              echo "✅ Main page: 200 OK"
            else
              echo "❌ Main page: FAILED"
              FAILED=$((FAILED + 1))
            fi

            # PS Park page loads
            if curl -sf -o /dev/null -w "%{http_code}" https://delovoy-park.ru/ps-park | grep -q "200"; then
              echo "✅ PS Park page: 200 OK"
            else
              echo "❌ PS Park page: FAILED"
              FAILED=$((FAILED + 1))
            fi

            # API responds with JSON
            if curl -sf https://delovoy-park.ru/api/ps-park/health | grep -q "status"; then
              echo "✅ PS Park API health: OK"
            else
              echo "❌ PS Park API health: FAILED"
              FAILED=$((FAILED + 1))
            fi

            echo ""
            echo "=== Container status ==="
            docker ps --filter name=delovoy --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            if [ "$FAILED" -gt 0 ]; then
              echo "⚠️ $FAILED smoke test(s) failed — deploy succeeded but check manually"
            fi

      - name: Notify on success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=✅ Deploy OK — v${{ needs.build-and-push.outputs.version }} (${{ github.sha }})" \
            -d "parse_mode=HTML" || true

      - name: Generate release notes & notify subscribers
        if: success()
        env:
          RELEASE_NOTIFY_SECRET: ${{ secrets.RELEASE_NOTIFY_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_URL: https://delovoy-park.ru
        run: |
          [ -z "$RELEASE_NOTIFY_SECRET" ] && echo "RELEASE_NOTIFY_SECRET not set, skipping" && exit 0

          VERSION="${{ needs.build-and-push.outputs.version }}"
          COMMIT_SHA="${{ github.sha }}"
          DEPLOYED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # --- Step 1: Check for manual release notes in docs/releases/current.md ---
          NOTES=""
          if [ -f "docs/releases/current.md" ]; then
            MANUAL=$(sed '/^>/d;/^#/d;/^[[:space:]]*$/d;/^-$/d;/^- *$/d' docs/releases/current.md | head -60)
            if [ -n "$MANUAL" ]; then
              NOTES="$MANUAL"
              echo "Using manually written release notes"
            fi
          fi

          # --- Step 2: Auto-generate with Gemini 2.5 Flash if no manual notes ---
          if [ -z "$NOTES" ] && [ -n "$GEMINI_API_KEY" ]; then
            echo "No manual notes — generating with Gemini 2.5 Flash..."

            LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -40)
            else
              COMMITS=$(git log -20 --pretty=format:"- %s" --no-merges)
            fi
            [ -z "$COMMITS" ] && COMMITS="- (no commits found)"

            PROMPT_TEXT="Ты — AI-ассистент бизнес-парка Деловой (Селятино). Сгенерируй краткие release notes на русском для Telegram.
          Правила:
          - Маркированный список, 3-7 пунктов
          - Группируй: новое, исправления, техническое
          - Понятно для менеджеров, не для разработчиков
          - Только плоский текст с дефисами, без markdown
          - Без заголовков, версии или даты
          - Макс 500 символов

          Коммиты:
          ${COMMITS}"

            PROMPT_JSON=$(printf '%s' "$PROMPT_TEXT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

            GEMINI_RESPONSE=$(curl -s --max-time 30 \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"contents\":[{\"parts\":[{\"text\":${PROMPT_JSON}}]}]}")

            NOTES=$(echo "$GEMINI_RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data['candidates'][0]['content']['parts'][0]['text'].strip())
          except Exception:
              print('')
          " 2>/dev/null)

            if [ -n "$NOTES" ]; then
              echo "AI-generated release notes:"
              echo "$NOTES"
            else
              echo "Gemini failed — falling back to commit list"
              NOTES="$COMMITS"
            fi

          elif [ -z "$NOTES" ]; then
            echo "No GEMINI_API_KEY — using raw commit list"
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -20)
            else
              NOTES=$(git log -10 --pretty=format:"- %s" --no-merges)
            fi
          fi

          # --- Step 3: Send to subscribers ---
          NOTES_JSON=$(printf '%s' "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "secret": "${RELEASE_NOTIFY_SECRET}",
            "version": "${VERSION}",
            "releaseNotes": ${NOTES_JSON},
            "commitSha": "${COMMIT_SHA}",
            "deployedAt": "${DEPLOYED_AT}"
          }
          EOFPAYLOAD
          )

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${APP_URL}/api/admin/release-notify")
          echo "Release notify response: $RESPONSE"

          # --- Step 4: Archive release notes ---
          ARCHIVE_NAME="docs/releases/${VERSION}-$(date +%Y-%m-%d).md"
          echo "# Release v${VERSION} — $(date +%Y-%m-%d)" > "$ARCHIVE_NAME"
          echo "" >> "$ARCHIVE_NAME"
          echo "$NOTES" >> "$ARCHIVE_NAME"

          cat > docs/releases/current.md << 'EOFTEMPLATE'
          # Что выкатилось в этом релизе

          > Заполни вручную перед деплоем. Если оставить пустым — AI сгенерирует из git log.

          ## Новое

          -

          ## Исправлено

          -

          ## Технические изменения

          -
          EOFTEMPLATE
          sed -i 's/^          //' docs/releases/current.md

          git config user.email "ci@delovoy-park.ru"
          git config user.name "Delovoy CI"
          git add "$ARCHIVE_NAME" docs/releases/current.md || true
          git diff --staged --quiet || git commit -m "chore(releases): archive v${VERSION} notes [skip ci]" || true
          git push origin HEAD || true

      - name: Notify on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=🚨 Deploy FAILED — commit ${{ github.sha }}" \
            -d "parse_mode=HTML" || true
