name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy-report.txt'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to VPS
        run: |
          exec > >(tee deploy-report.txt) 2>&1
          echo "=== $(date -u) ==="

          # Install sshpass
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

          NEW_IP="5.129.255.244"
          PASS='f.?Us+JKJy3S?8'

          echo "Step 1: Port scan"
          for p in 22 80 443; do
            timeout 5 bash -c "echo | nc -w3 $NEW_IP $p" 2>/dev/null && echo "Port $p: OPEN" || echo "Port $p: CLOSED"
          done

          echo ""
          echo "Step 2: SSH test"
          SSH_OUT=$(sshpass -p "$PASS" ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@$NEW_IP 'echo SSH_OK; uname -a; uptime; docker ps 2>/dev/null || echo NO_DOCKER; cat /var/log/deploy.log 2>/dev/null | tail -20 || echo NO_LOG' 2>&1)
          echo "$SSH_OUT" | tail -30

          echo ""
          echo "Step 3: Deploy if SSH works"
          if echo "$SSH_OUT" | grep -q "SSH_OK"; then
            SSH_CMD="sshpass -p $PASS ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 root@$NEW_IP"

            echo "3a: Fix dpkg + install Docker..."
            $SSH_CMD 'dpkg --configure -a; apt-get install -f -y; which docker || curl -fsSL https://get.docker.com | sh; systemctl enable docker; systemctl start docker; which git || apt-get install -y git'

            echo "3b: Clone/update repo..."
            $SSH_CMD 'if [ -d /opt/delovoy/app ]; then cd /opt/delovoy/app && git pull origin main; else mkdir -p /opt/delovoy && git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app; fi'

            echo "3c: Configure Docker mirror to bypass rate limit..."
            $SSH_CMD 'mkdir -p /etc/docker && echo "{\"registry-mirrors\": [\"https://mirror.gcr.io\"]}" > /etc/docker/daemon.json && systemctl restart docker && sleep 5'

            echo "3d: Pull Docker images..."
            $SSH_CMD 'docker pull postgres:16-alpine && docker pull redis:7-alpine' || {
              echo "Mirror pull failed, waiting 2 min and trying direct..."
              sleep 120
              $SSH_CMD 'docker pull postgres:16-alpine && docker pull redis:7-alpine'
            }

            echo "3e: Deploy app..."
            $SSH_CMD 'cd /opt/delovoy/app && bash scripts/deploy-full.sh'

            echo "3f: Verify..."
            sleep 20
            $SSH_CMD 'docker compose -f /opt/delovoy/docker-compose.yml ps; curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost'
            echo ""
            echo "DEPLOY_COMPLETE"
          else
            echo "SSH FAILED — cannot deploy"
          fi

          echo ""
          echo "Step 4: HTTP check"
          curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 "http://$NEW_IP/" 2>&1 || echo "HTTP_FAILED"
          echo ""

      - name: Commit report
        if: always()
        run: |
          git pull origin main --rebase || true
          git config user.name "deploy-bot"
          git config user.email "bot@delovoy-park.ru"
          git add -f deploy-report.txt
          git diff --cached --quiet || git commit -m "deploy: report $(date -u +%H:%M) [skip ci]"
          git push origin main || true
