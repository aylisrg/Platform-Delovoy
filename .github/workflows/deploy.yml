name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  check-vps:
    name: Check VPS Connectivity
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Scan VPS ports and test connectivity
        run: |
          echo "=== Port scan ==="
          for port in 22 80 443 2222 3000 8080 8443; do
            (echo > /dev/tcp/45.144.222.103/$port) 2>/dev/null && echo "Port $port: OPEN" || echo "Port $port: CLOSED"
          done

          echo ""
          echo "=== HTTP test ==="
          curl -sv --max-time 10 http://45.144.222.103/ 2>&1 | head -30

          echo ""
          echo "=== HTTPS test ==="
          curl -sv --max-time 10 https://45.144.222.103/ 2>&1 | head -30

          echo ""
          echo "=== SSH banner test ==="
          timeout 10 bash -c 'cat < /dev/tcp/45.144.222.103/22' 2>&1 | head -5 || echo "SSH: no banner / connection refused"

          echo ""
          echo "=== Timeweb API test ==="
          curl -s -o /dev/null -w "Timeweb API: HTTP %{http_code}" https://api.timeweb.cloud/api/v1/servers 2>&1
          echo ""

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: check-vps
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: "45.144.222.103"
          username: root
          password: "x5EKRBsc443x--"
          port: 22
          timeout: 30s
          command_timeout: 10m
          debug: true
          script: |
            echo "Connected!"
            which docker || curl -fsSL https://get.docker.com | sh
            which git || apt-get update && apt-get install -y git
            if [ -d "/opt/delovoy" ]; then
              cd /opt/delovoy
              docker compose down 2>/dev/null || true
            fi
            rm -rf /opt/delovoy
            mkdir -p /opt/delovoy
            git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
            cd /opt/delovoy/app
            bash scripts/deploy-full.sh
            sleep 15
            curl -s -o /dev/null -w "%{http_code}" http://localhost
            docker compose -f /opt/delovoy/docker-compose.yml ps
            echo "Deploy done at $(date)"
