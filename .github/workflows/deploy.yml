name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  diagnose-and-deploy:
    name: Diagnose VPS & Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check VPS status via Timeweb API
        env:
          TW_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          echo "=== Checking Timeweb API token ==="
          if [ -z "$TW_TOKEN" ] || [ "$TW_TOKEN" = "placeholder" ]; then
            echo "ERROR: TIMEWEB_API_TOKEN secret is not set!"
            echo "Go to GitHub repo Settings → Secrets → Actions → New secret"
            echo "Name: TIMEWEB_API_TOKEN"
            echo "Value: your token from https://timeweb.cloud/my/api-keys"
            exit 1
          fi
          echo "Token found (${#TW_TOKEN} chars)"

          echo ""
          echo "=== Server info ==="
          curl -sf -H "Authorization: Bearer $TW_TOKEN" \
            "https://api.timeweb.cloud/api/v1/servers/7215757" | python3 -m json.tool || echo "API v1 failed, trying v2..."

          curl -sf -H "Authorization: Bearer $TW_TOKEN" \
            "https://api.timeweb.cloud/api/v2/servers/7215757" | python3 -m json.tool 2>/dev/null || echo "API v2 also failed"

          echo ""
          echo "=== Quick port check ==="
          timeout 5 bash -c 'echo | nc -w3 45.144.222.103 22' 2>&1 && echo "SSH: OPEN" || echo "SSH port 22: CLOSED/FILTERED"
          timeout 5 bash -c 'echo | nc -w3 45.144.222.103 80' 2>&1 && echo "HTTP: OPEN" || echo "HTTP port 80: CLOSED/FILTERED"

      - name: Deploy via SSH (if port open)
        uses: appleboy/ssh-action@v1
        with:
          host: "45.144.222.103"
          username: root
          password: "x5EKRBsc443x--"
          port: 22
          timeout: 15s
          command_timeout: 10m
          debug: true
          script: |
            echo "Connected!"
            which docker || curl -fsSL https://get.docker.com | sh
            which git || apt-get update && apt-get install -y git
            [ -d "/opt/delovoy" ] && cd /opt/delovoy && docker compose down 2>/dev/null || true
            rm -rf /opt/delovoy
            mkdir -p /opt/delovoy
            git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
            cd /opt/delovoy/app && bash scripts/deploy-full.sh
            sleep 15
            curl -s -o /dev/null -w "%{http_code}" http://localhost
            echo " — Deploy done at $(date)"
