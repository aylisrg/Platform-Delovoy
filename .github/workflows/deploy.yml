name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: "45.144.222.103"
          username: root
          password: "x5EKRBsc443x--"
          command_timeout: 10m
          script: |
            set -e

            # Install Docker if missing
            which docker || curl -fsSL https://get.docker.com | sh

            # Install git if missing
            which git || apt-get update && apt-get install -y git

            # Clean previous deploy
            if [ -d "/opt/delovoy" ]; then
              cd /opt/delovoy
              docker compose down 2>/dev/null || true
            fi
            rm -rf /opt/delovoy

            # Clone fresh
            mkdir -p /opt/delovoy
            git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
            cd /opt/delovoy/app

            # Run deploy script
            bash scripts/deploy-full.sh

            # Verify
            sleep 15
            curl -s -o /dev/null -w "%{http_code}" http://localhost || echo "App starting..."
            docker compose -f /opt/delovoy/docker-compose.yml ps
            echo "Deploy completed at $(date)"
