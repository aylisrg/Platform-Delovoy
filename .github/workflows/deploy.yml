name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Diagnose and deploy
        env:
          TW_TOKEN: ${{ secrets.TIMEWEB_API_TOKEN }}
        run: |
          set +e
          REPORT="deploy-report.txt"
          echo "=== DEPLOY DIAGNOSTIC REPORT ==="  > $REPORT
          echo "Time: $(date -u)"                 >> $REPORT
          echo ""                                  >> $REPORT

          # 1. Timeweb API
          echo "--- TIMEWEB API ---" >> $REPORT
          if [ -z "$TW_TOKEN" ] || [ "$TW_TOKEN" = "placeholder" ]; then
            echo "TOKEN: NOT SET" >> $REPORT
          else
            echo "TOKEN: SET (${#TW_TOKEN} chars)" >> $REPORT
            SERVER=$(curl -sf -H "Authorization: Bearer $TW_TOKEN" "https://api.timeweb.cloud/api/v1/servers/7215757" 2>&1)
            echo "API v1 response: $SERVER" >> $REPORT
            SERVER2=$(curl -sf -H "Authorization: Bearer $TW_TOKEN" "https://api.timeweb.cloud/api/v2/servers/7215757" 2>&1)
            echo "API v2 response: $SERVER2" >> $REPORT
          fi
          echo "" >> $REPORT

          # 2. Port scan
          echo "--- PORT SCAN ---" >> $REPORT
          for port in 22 80 443 2222; do
            timeout 5 bash -c "echo | nc -w3 45.144.222.103 $port" 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "Port $port: OPEN" >> $REPORT
            else
              echo "Port $port: CLOSED" >> $REPORT
            fi
          done
          echo "" >> $REPORT

          # 3. HTTP test
          echo "--- HTTP TEST ---" >> $REPORT
          HTTP_CODE=$(curl -s -o /tmp/http_body -w "%{http_code}" --max-time 10 http://45.144.222.103/ 2>&1)
          echo "HTTP status: $HTTP_CODE" >> $REPORT
          echo "HTTP body: $(cat /tmp/http_body 2>/dev/null | head -5)" >> $REPORT
          echo "" >> $REPORT

          # 4. SSH test
          echo "--- SSH TEST ---" >> $REPORT
          apt-get update -qq > /dev/null 2>&1 && apt-get install -y -qq sshpass > /dev/null 2>&1
          SSH_OUT=$(sshpass -p 'x5EKRBsc443x--' ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o PasswordAuthentication=yes root@45.144.222.103 'echo SSH_OK' 2>&1)
          SSH_EXIT=$?
          echo "SSH exit code: $SSH_EXIT" >> $REPORT
          echo "SSH output (last 15 lines):" >> $REPORT
          echo "$SSH_OUT" | tail -15 >> $REPORT
          echo "" >> $REPORT

          # 5. Deploy if SSH works
          if echo "$SSH_OUT" | grep -q "SSH_OK"; then
            echo "--- DEPLOYING ---" >> $REPORT
            sshpass -p 'x5EKRBsc443x--' ssh -o StrictHostKeyChecking=no root@45.144.222.103 << 'REMOTESCRIPT'
              set -e
              which docker || curl -fsSL https://get.docker.com | sh
              which git || (apt-get update && apt-get install -y git)
              [ -d "/opt/delovoy" ] && cd /opt/delovoy && docker compose down 2>/dev/null || true
              rm -rf /opt/delovoy
              mkdir -p /opt/delovoy
              git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
              cd /opt/delovoy/app && bash scripts/deploy-full.sh
          REMOTESCRIPT
            echo "Deploy: DONE" >> $REPORT
          else
            echo "--- DEPLOY SKIPPED (SSH failed) ---" >> $REPORT
          fi

          cat $REPORT

          # Commit report to repo
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $REPORT
          git commit -m "ci: deploy diagnostic report [skip ci]" || true
          git push || true
