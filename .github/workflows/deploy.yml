name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # === ПОЛНАЯ ОЧИСТКА СЕРВЕРА ===
            if [ -d "/opt/delovoy" ]; then
              cd /opt/delovoy
              docker compose down -v 2>/dev/null || true
            fi
            docker system prune -af --volumes 2>/dev/null || true
            rm -rf /opt/delovoy

            # === ЧИСТЫЙ ДЕПЛОЙ С НУЛЯ ===
            mkdir -p /opt/delovoy
            git clone https://github.com/aylisrg/Platform-Delovoy.git /opt/delovoy/app
            cd /opt/delovoy/app
            bash scripts/deploy-full.sh

            # Добавить Timeweb API токен в .env после генерации
            grep -q "TIMEWEB_API_TOKEN" /opt/delovoy/.env 2>/dev/null || \
              echo -e "\n# Timeweb Cloud API\nTIMEWEB_API_TOKEN=${{ secrets.TIMEWEB_API_TOKEN }}\nTIMEWEB_SERVER_ID=7215757" >> /opt/delovoy/.env

            echo "Deployed at $(date)"
