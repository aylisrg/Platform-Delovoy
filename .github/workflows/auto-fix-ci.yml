name: Auto Fix CI

# Запускается автоматически когда CI-workflow падает
# Claude Code читает логи ошибок, исправляет код и пушит фикс

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main, "claude/**", "feature/**"]
    types: [completed]

# Один фикс за раз для одного run
concurrency:
  group: auto-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  auto-fix:
    name: Fix CI errors with Claude
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout failing commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Collect failed job logs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runId = ${{ github.event.workflow_run.id }};
            const payload = context.payload.workflow_run;

            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            let report = [
              `Workflow:  ${payload.name}`,
              `Branch:    ${payload.head_branch}`,
              `Commit:    ${payload.head_sha}`,
              `Run URL:   ${payload.html_url}`,
              '',
            ].join('\n');

            for (const job of jobs) {
              if (job.conclusion !== 'failure') continue;
              report += `\n${'='.repeat(60)}\n`;
              report += `FAILED JOB: ${job.name}\n`;
              report += `${'='.repeat(60)}\n`;
              try {
                const { data: logs } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                // Берём хвост лога — там самое важное
                report += String(logs).slice(-10000);
              } catch (e) {
                report += `(не удалось скачать логи: ${e.message})\n`;
              }
            }

            fs.writeFileSync('ci_failure_report.txt', report.slice(0, 25000));
            console.log(`Saved ${report.length} chars of logs`);

      - name: Fix with Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            CI pipeline failed. Отчёт об ошибках в файле `ci_failure_report.txt`.

            Действуй по шагам:
            1. Прочитай `ci_failure_report.txt` — разберись что именно сломалось
            2. Найди сломанный код и исправь его
            3. Запусти `npm run lint` — убедись что lint чистый
            4. Запусти `npm test` — убедись что тесты зелёные
            5. Закоммить фикс с сообщением: `fix(ci): auto-fix — <краткое описание>`

            Правила:
            - Исправляй ТОЛЬКО сломанное. Не рефактори, не меняй стиль, не добавляй комментарии.
            - Если не уверен в фиксе — не делай коммит, объясни что именно непонятно.
            - Один коммит, минимальные изменения.
