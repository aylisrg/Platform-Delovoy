name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Заглушки для Next.js build (реальный DB не нужен при сборке)
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
          REDIS_URL: 'redis://localhost:6379'
          NEXTAUTH_SECRET: 'ci-placeholder-secret'
          AUTH_SECRET: 'ci-placeholder-secret'
          NEXTAUTH_URL: 'http://localhost:3000'
