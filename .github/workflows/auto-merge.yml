# ОТКЛЮЧЕНО — переход на PR-based flow
# Ветки claude/** и feature/** больше НЕ мержатся автоматически.
# Вместо этого: пуш → CI проверяет → разработчик создаёт PR → ревью → мерж вручную.
#
# Старый workflow мержил всё подряд без ревью, что приводило к
# незавершённым фичам на проде.

name: "CI: Test & Build (branches)"

on:
  push:
    branches:
      - 'claude/**'
      - 'feature/**'

jobs:
  test-and-build:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
          REDIS_URL: 'redis://localhost:6379'
          NEXTAUTH_SECRET: 'ci-placeholder-secret'
          NEXTAUTH_URL: 'http://localhost:3000'
