name: Agents Eval — Regression Check

on:
  pull_request:
    paths:
      - "agents/**"
      - ".claude/agents/**"
      - ".claude/commands/**"
      - "eval/**"
      - "scripts/pipeline.sh"
      - "scripts/parallel-pipeline.sh"
  push:
    branches: [main]
    paths:
      - "agents/**"
      - ".claude/agents/**"
      - "eval/**"

concurrency:
  group: agents-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Run agents eval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node

      - name: Validate pipeline.sh syntax
        run: bash -n scripts/pipeline.sh && bash -n scripts/parallel-pipeline.sh

      - name: Validate shell scripts with shellcheck
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true
        with:
          scandir: "./scripts"

      - name: Run eval runner on golden fixtures
        run: npm run agents:eval

      - name: Run eval checker unit tests
        run: npx vitest run eval

      - name: Validate native sub-agent frontmatter
        run: |
          set -e
          fail=0
          for f in .claude/agents/*.md; do
            name=$(basename "$f" .md)
            if [[ "$name" == "README" ]]; then continue; fi
            head -n1 "$f" | grep -q '^---$' || { echo "❌ $f: missing YAML frontmatter"; fail=1; }
            grep -q "^name:" "$f" || { echo "❌ $f: missing 'name:' field"; fail=1; }
            grep -q "^description:" "$f" || { echo "❌ $f: missing 'description:' field"; fail=1; }
            grep -q "^model:" "$f" || { echo "❌ $f: missing 'model:' field"; fail=1; }
          done
          if [[ $fail -ne 0 ]]; then exit 1; fi
          echo "✅ All native sub-agents have valid frontmatter"

      - name: Require CHANGELOG update for agent changes
        if: github.event_name == 'pull_request'
        run: |
          set -e
          base_ref="${{ github.base_ref }}"
          git fetch origin "$base_ref" --depth=1
          changed_agents=$(git diff --name-only "origin/$base_ref" -- 'agents/*.md' ':!agents/README.md' ':!agents/SECURITY.md' ':!agents/CHANGELOG.md' || true)
          if [[ -n "$changed_agents" ]]; then
            if ! git diff --name-only "origin/$base_ref" -- agents/CHANGELOG.md | grep -q CHANGELOG; then
              echo "❌ Agent prompts changed but agents/CHANGELOG.md was not updated"
              echo "Changed files:"
              echo "$changed_agents"
              exit 1
            fi
            echo "✅ CHANGELOG.md updated"
          fi
