name: Docker Cleanup on VPS

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Clean Docker on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Disk before ==="
            df -h /

            echo "=== Docker disk usage ==="
            docker system df

            # Prune unused images/containers/build-cache without touching running containers.
            # The app container keeps its image in use — no stop needed and no downtime.
            echo "=== Remove unused Docker resources ==="
            docker system prune -af || true
            docker builder prune -af || true

            echo "=== Check large files outside Docker ==="
            du -sh /opt/backups/ 2>/dev/null || true
            du -sh /var/log/ 2>/dev/null || true
            du -sh /tmp/ 2>/dev/null || true

            echo "=== Clean old DB backups (keep last 3) ==="
            ls -t /opt/backups/db-*.sql.gz 2>/dev/null | tail -n +4 | xargs rm -f || true

            echo "=== Clean old logs ==="
            find /var/log -name "*.gz" -mtime +7 -delete 2>/dev/null || true
            journalctl --vacuum-size=50M 2>/dev/null || true

            echo "=== Disk after ==="
            df -h /
