# Staging environment — staging.delovoy-park.ru
# Install: sudo cp scripts/nginx-staging.conf /etc/nginx/sites-available/staging.delovoy-park.ru
#          sudo ln -s /etc/nginx/sites-available/staging.delovoy-park.ru /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d staging.delovoy-park.ru
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name staging.delovoy-park.ru;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
