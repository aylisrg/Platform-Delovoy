services:
  postgres:
    image: postgres:16-alpine
    container_name: delovoy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: delovoy_park
      POSTGRES_USER: delovoy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delovoy -d delovoy_park"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: delovoy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ghcr.io/aylisrg/platform-delovoy:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delovoy-app
    restart: on-failure:5
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://delovoy:${POSTGRES_PASSWORD}@postgres:5432/delovoy_park"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "production"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "--timeout=5", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  backup:
    image: postgres:16-alpine
    container_name: delovoy-backup
    restart: "no"
    volumes:
      - ./scripts/backup-db.sh:/scripts/backup-db.sh:ro
      - backup_data:/backups/postgres
    environment:
      DATABASE_URL: "postgresql://delovoy:${POSTGRES_PASSWORD}@postgres:5432/delovoy_park"
      BACKUP_DIR: "/backups/postgres"
      RETENTION_DAYS: "30"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_ADMIN_CHAT_ID: "${TELEGRAM_ADMIN_CHAT_ID}"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c", "chmod +x /scripts/backup-db.sh && /scripts/backup-db.sh"]
    profiles:
      - backup
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  backup_data:
